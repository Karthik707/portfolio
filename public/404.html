<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <!--
      GitHub Pages SPA fallback.
      Redirects deep links back to index.html so React Router can handle them.
      Based on the technique by Rafael Pedicini (spa-github-pages, MIT).
    -->
    <script>
      (function () {
        var segmentCount = 0; // set to 1 for project pages if needed
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + segmentCount)
              .join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
